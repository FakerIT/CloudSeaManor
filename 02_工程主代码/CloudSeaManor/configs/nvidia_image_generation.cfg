# NVIDIA Image Generation Configuration
# This file contains configuration for the NVIDIA AI image generation integration

# API Configuration
nvidia_api_key="nvapi-xxxxxxxxxxxx"
nvidia_api_endpoint="https://ai.api.nvidia.com/v1/genai/stabilityai/stable-diffusion-3-medium"

# Generation Settings
default_image_width=1024
default_image_height=1024
default_steps=50
default_cfg_scale=7.0
default_timeout_seconds=120

# Cache Settings
max_cache_size=100
enable_auto_save=true
auto_save_directory="generated_assets/"

# UI Settings
show_preview_panel=true
preview_update_interval=0.5

# Prompt Settings
default_negative_prompt="low quality, blurry, bad anatomy, deformed, ugly, bad hands, extra fingers"
enable_prompt_templates=true

# Performance Settings
max_concurrent_requests=3
enable_async_generation=true
worker_thread_count=1
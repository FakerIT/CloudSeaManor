# ========== 云海作物品质参数 ==========
# 云海状态对作物品质的影响：
# Clear  → 普通（1.0x 产量）
# Mist   → 普通或优质（20% 概率出优质）
# DenseCloud → 优质（稳定 1.3x 产量）
# Tide   → 稀有（稳定 1.8x 产量）；若 spirit_tier=true 则出灵品（2.5x）

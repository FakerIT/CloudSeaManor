# ========== 键位绑定 ==========
# 格式：action=KeyName[,modifiers...]
# modifiers 可选：Shift, Ctrl, Alt（多个用 | 分隔，如 Shift|Ctrl）
# 支持的按键名称：
#   字母：A-Z
#   数字：Num0-Num9
#   方向：Up, Down, Left, Right
#   功能：Space, Enter, Escape, Tab, Backspace, Delete
#   修饰：LShift, RShift, LControl, RControl, LAlt, RAlt
# 示例：MoveUp=W
# 示例：Sprint=LShift
# 示例：DebugToggle=F3

key_MoveUp=W
key_MoveDown=S
key_MoveLeft=A
key_MoveRight=D
key_Interact=E
key_OpenInventory=I
key_Cancel=Escape
key_Confirm=Enter
key_Sprint=LShift
key_UseTool=Q
key_OpenMenu=Escape
key_DebugToggle=F3
key_CloudToggle=F5

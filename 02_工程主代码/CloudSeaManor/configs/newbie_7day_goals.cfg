# ============================================================================
# 《云海山庄》新手 7 天推荐目标配置（HUD 草案）
# ============================================================================
# 说明：
# - 本文件用于驱动“新手推荐目标”文案，建议在 HUD 层按 day 读取对应键。
# - 命名规范：newbie_day{N}_goal_{idx}
# - N: 1~7
# - idx: 1~3（主目标+两个副目标）
#
# 建议接入策略：
# - day <= 7 读取对应 day 键
# - day > 7 默认读取 day7 键（或循环 day1~day7，二选一）
# - 键缺失时回退到 gameplay.cfg 的默认推荐文案

# ========== Day 1 ==========
newbie_day1_title=第1天推荐：先站稳脚跟
newbie_day1_goal_1=清理少量杂物并开垦 4~6 块地
newbie_day1_goal_2=完成首次播种与浇水（至少 1 种作物）
newbie_day1_goal_3=与 1 位 NPC 对话，建立第一条社交线

# ========== Day 2 ==========
newbie_day2_title=第2天推荐：形成日常循环
newbie_day2_goal_1=保持昨日地块浇水不断档
newbie_day2_goal_2=收集木材与基础资源，为建造做准备
newbie_day2_goal_3=尝试一次送礼（有茶包则优先）

# ========== Day 3 ==========
newbie_day3_title=第3天推荐：观察系统联动
newbie_day3_goal_1=完成一次工坊加工并领取产出
newbie_day3_goal_2=尝试提升装饰评分（触发经营加成）
newbie_day3_goal_3=检查日切汇总，理解收益来源

# ========== Day 4 ==========
newbie_day4_title=第4天推荐：扩展经营面
newbie_day4_goal_1=补齐农田维护（病虫/施肥/浇水）
newbie_day4_goal_2=推进畜棚投喂，确保次日产出
newbie_day4_goal_3=继续与目标 NPC 对话，稳定好感增长

# ========== Day 5 ==========
newbie_day5_title=第5天推荐：建立中期目标
newbie_day5_goal_1=选择一个主目标：主屋升级 / 关系推进 / 灵界探索
newbie_day5_goal_2=为主目标准备关键资源（金币/材料/物品）
newbie_day5_goal_3=完成一次灵界探索或战斗（可选）

# ========== Day 6 ==========
newbie_day6_title=第6天推荐：提效与复盘
newbie_day6_goal_1=优化地块与工作动线，减少重复跑图
newbie_day6_goal_2=提高客栈或畜棚任一线的日结表现
newbie_day6_goal_3=确保完成一次手动存档与读档自检

# ========== Day 7 ==========
newbie_day7_title=第7天推荐：完成周闭环
newbie_day7_goal_1=完成本周主目标的阶段推进（至少 1 次）
newbie_day7_goal_2=确认两条经营线正增长（如客栈+工坊）
newbie_day7_goal_3=查看本周结算并设定下周目标

# ========== 文案样式与分隔（可选） ==========
newbie_goals_title_prefix=新手引导｜
newbie_goals_item_prefix=-
newbie_goals_separator= / 
newbie_goals_fallback_title=今日推荐
newbie_goals_fallback_1=完成一项经营任务（种植/加工/客栈）
newbie_goals_fallback_2=完成一项社交任务（对话/送礼）
newbie_goals_fallback_3=完成一次日结并查看汇总反馈
